<script>
const Q=[
{n:"01",t:"Install and configure Ansible",d:"easy",f:["ansible.cfg","inventory/hosts"],
q:`Install and configure Ansible on control node <b>control.lab.example.com</b>:<ul><li>Install required packages</li><li>Create static inventory <code>/home/student/ansible/inventory</code>: node1→dev, node2→test, node3+node4→prod, node5→balancers, prod is child of webservers</li><li>Create <code>/home/student/ansible/ansible.cfg</code>: inventory path, default roles dir, default collections dir</li></ul>`,
a:"Install ansible-automation-platform-common and ansible-navigator. Create working dirs. Generate ansible.cfg via <code>ansible-config init --disabled</code> then trim to required keys. Build static inventory with correct groups and the <code>[webservers:children]</code> parent.",
s:[{l:"ansible.cfg",c:`[defaults]
inventory         = /home/student/ansible/inventory
remote_user       = student
host_key_checking = False
roles_path        = /home/student/ansible/roles:/usr/share/ansible/roles
collections_path  = ./collections/:.ansible/collections:/usr/share/ansible/collections
vault_password_file = /home/student/ansible/secret.txt

[privilege_escalation]
become       = True
become_method= sudo
become_user  = root`},{l:"inventory/hosts",c:`[dev]
node1
[test]
node2
[prod]
node3
node4
[balancers]
node5
[webservers:children]
prod`}],
r:`# No playbook — pure configuration
ansible --version
ansible-inventory --graph
ansible all -m ping`,
v:["ansible --version | grep 'config file'  # must point to your ansible.cfg","ansible-inventory --graph  # webservers must appear as parent of prod","ansible all -m ping  # SUCCESS pong from all 5 nodes"],
tr:["roles_path must include BOTH paths — missing /usr/share/ansible/roles breaks rhel-system-roles","[webservers:children] not [webservers] — the :children suffix is mandatory","remote_user = student — PDF uses greg; this lab uses student","vault_password_file set here so Q14/Q15 work automatically"]},
{n:"02",t:"Create yum repositories",d:"easy",f:["playbooks/yum_repo.yml"],
q:`Create <code>playbooks/yum_repo.yml</code> that creates two yum repos on <b>all</b> managed nodes:<ul><li><b>EX294_BASE</b> — BaseOS, GPG enabled, enabled</li><li><b>EX294_STREAM</b> — AppStream, GPG enabled, enabled</li></ul>Base root: <code>http://content/rhel9.0/x86_64/dvd/</code> · GPG key: <code>RPM-GPG-KEY-redhat-release</code>`,
a:"Use <code>ansible.builtin.yum_repository</code>. Both repos share the same GPG key URL. The <code>file:</code> key controls the .repo filename in /etc/yum.repos.d/.",
s:[{l:"yum_repo.yml",c:`---
- name: Configure YUM repositories on all managed nodes
  hosts: all
  tasks:
    - ansible.builtin.yum_repository:
        file: EX294_BASE
        name: EX294_BASE
        description: EX294 base software
        baseurl: http://content/rhel9.0/x86_64/dvd/BaseOS
        gpgcheck: yes
        gpgkey: http://content/rhel9.0/x86_64/dvd/RPM-GPG-KEY-redhat-release
        enabled: yes
    - ansible.builtin.yum_repository:
        file: EX294_STREAM
        name: EX294_STREAM
        description: EX294 stream software
        baseurl: http://content/rhel9.0/x86_64/dvd/AppStream
        gpgcheck: yes
        gpgkey: http://content/rhel9.0/x86_64/dvd/RPM-GPG-KEY-redhat-release
        enabled: yes`}],
r:`cd /home/student/ansible
ansible-navigator run playbooks/yum_repo.yml -m stdout`,
v:["ansible all -a 'yum repoinfo'  # both repos on every node","ansible all -a 'yum -y install ftp && rpm -q ftp'"],
tr:["GPG key URL in PDF has a line-wrap typo","gpgcheck: yes not gpgcheck: 1","hosts: all — repos must be on ALL nodes"]},
{n:"03",t:"Install packages",d:"easy",f:["playbooks/packages.yml"],
q:`Create <code>playbooks/packages.yml</code>:<ul><li>Install <b>php</b> and <b>mariadb</b> on <b>dev, test, prod</b></li><li>Install <b>RPM Development Tools</b> group on <b>dev</b> only</li><li>Update <b>all packages</b> to latest on <b>dev</b> only</li></ul>`,
a:"Two separate plays. Play 1 targets dev,test,prod. Play 2 targets dev only for the group install and full upgrade. Use <code>name: \"*\"</code> with <code>state: latest</code>.",
s:[{l:"packages.yml",c:`---
- name: Install php and mariadb on dev, test, prod
  hosts: dev,test,prod
  tasks:
    - ansible.builtin.yum:
        name: [php, mariadb]
        state: present

- name: Dev only — RPM Dev Tools and full upgrade
  hosts: dev
  tasks:
    - ansible.builtin.yum:
        name: "@RPM Development Tools"
        state: present
    - ansible.builtin.yum:
        name: "*"
        state: latest`}],
r:`cd /home/student/ansible
ansible-navigator run playbooks/packages.yml -m stdout`,
v:["ansible dev,test,prod -a 'rpm -q php mariadb'","ansible dev -a 'yum grouplist installed'"],
tr:["\"@RPM Development Tools\" — @ prefix is mandatory","Two separate plays — host targets differ","name: \"*\" with state: latest not state: present"]},
{n:"04",t:"Use the SELinux role",d:"med",f:["playbooks/selinux.yml"],
q:`Create <code>playbooks/selinux.yml</code> that:<ul><li>Runs on <b>all</b> managed nodes</li><li>Uses the <b>rhel-system-roles.selinux</b> role</li><li>Configures SELinux policy as <b>targeted</b>, state as <b>enforcing</b></li></ul>`,
a:"<b>Two options</b> — ansible-navigator runs inside an EE container and cannot see RPM roles in /usr/share/ansible/roles on the host.<br><br><b>Option 1 — Copy RPM role</b>: Install RPM, copy the selinux role into your working roles/ dir, use role name <code>rhel-system-roles.selinux</code>.<br><br><b>Option 2 — Collection FQCN</b>: Use the redhat.rhel_system_roles collection from Q05 with full name <code>redhat.rhel_system_roles.selinux</code>. Both run with <code>ansible-navigator run -m stdout</code>.",
s:[{l:"Option 1 — Copy RPM role",c:`# Install and copy the role
sudo dnf -y install rhel-system-roles
cp -r /usr/share/ansible/roles/rhel-system-roles.selinux \\
      /home/student/ansible/roles/

---
- hosts: all
  become: true
  vars:
    selinux_policy: targeted
    selinux_state: enforcing
  tasks:
    - block:
        - ansible.builtin.include_role:
            name: rhel-system-roles.selinux
      rescue:
        - ansible.builtin.fail:
            msg: "role failed"
          when: not selinux_reboot_required
        - ansible.builtin.reboot:
        - ansible.builtin.wait_for_connection:
            delay: 10
            timeout: 300
        - ansible.builtin.include_role:
            name: rhel-system-roles.selinux`},
{l:"Option 2 — Collection FQCN",c:`# Collection installed in Q05 — no copy needed

---
- hosts: all
  become: true
  vars:
    selinux_policy: targeted
    selinux_state: enforcing
  tasks:
    - block:
        - ansible.builtin.include_role:
            name: redhat.rhel_system_roles.selinux
      rescue:
        - ansible.builtin.fail:
            msg: "role failed"
          when: not selinux_reboot_required
        - ansible.builtin.reboot:
        - ansible.builtin.wait_for_connection:
            delay: 10
            timeout: 300
        - ansible.builtin.include_role:
            name: redhat.rhel_system_roles.selinux`}],
r:`cd /home/student/ansible
# Option 1 only — copy role first:
sudo dnf -y install rhel-system-roles
cp -r /usr/share/ansible/roles/rhel-system-roles.selinux roles/

# Both options:
ansible-navigator run playbooks/selinux.yml -m stdout`,
v:["ansible all -m shell -a 'grep ^SELINUX= /etc/selinux/config'  # SELINUX=enforcing","ansible all -m shell -a 'getenforce'  # Enforcing on all 5 nodes"],
tr:["Option 1: copy the role — EE container cannot see /usr/share/ansible/roles on the host","Option 2: full FQCN redhat.rhel_system_roles.selinux — short name selinux resolves to nothing","rescue must check selinux_reboot_required before rebooting","selinux_policy: targeted must be specified explicitly"]},
{n:"05",t:"Install a collection",d:"med",f:["collections/requirements.yml"],
q:`Install collection artifacts from <code>http://classroom/materials/</code> into <code>/home/student/ansible/collections</code>:<ul><li>redhat-insights-1.0.7.tar.gz</li><li>community-general-5.5.0.tar.gz</li><li>redhat-rhel_system_roles-1.19.3.tar.gz</li></ul>`,
a:"Create <code>collections/requirements.yml</code> with a <code>collections:</code> key. Run <code>ansible-galaxy collection install -r</code> with the <code>-p</code> flag. Installing redhat-rhel_system_roles here enables Q04 Option 2.",
s:[{l:"collections/requirements.yml",c:`---
collections:
  - name: http://classroom/materials/redhat-insights-1.0.7.tar.gz
  - name: http://classroom/materials/community-general-5.5.0.tar.gz
  - name: http://classroom/materials/redhat-rhel_system_roles-1.19.3.tar.gz`}],
r:`cd /home/student/ansible
ansible-galaxy collection install \\
  -r collections/requirements.yml \\
  -p /home/student/ansible/collections`,
v:["ansible-navigator collections  # all three listed","ls collections/ansible_collections/  # community/ and redhat/ present"],
tr:["Use -p not --collections-path","collections: key at root level — not nested under roles:","This enables Q04 Option 2"]},
{n:"06",t:"Install roles using Ansible Galaxy",d:"easy",f:["roles/requirements.yml"],
q:`Use <code>roles/requirements.yml</code> to install roles to <code>/home/student/ansible/roles</code>:<ul><li><code>http://classroom/materials/haproxy.tar</code> → name: <b>balancer</b></li><li><code>http://classroom/materials/phpinfo.tar</code> → name: <b>phpinfo</b></li></ul>`,
a:"Root-level YAML list (not a <code>roles:</code> key). Each entry has <code>src:</code> and <code>name:</code>. Run <code>ansible-galaxy install -r</code>.",
s:[{l:"roles/requirements.yml",c:`---
- src: http://classroom/materials/haproxy.tar
  name: balancer

- src: http://classroom/materials/phpinfo.tar
  name: phpinfo`}],
r:`cd /home/student/ansible
ansible-galaxy install -r roles/requirements.yml
ansible-galaxy list`,
v:["ansible-galaxy list  # balancer and phpinfo both listed","ls roles/  # apache/ balancer/ phpinfo/ all present"],
tr:["name: balancer renames the role — without it installs as haproxy","Root-level list not a roles: key","ansible-galaxy install not ansible-galaxy collection install"]},
{n:"07",t:"Create and use the apache role",d:"hard",f:["roles/apache/","playbooks/apache.yml"],
q:`Create role <b>apache</b> in <code>roles/</code>:<ul><li>httpd installed, enabled, started</li><li>firewalld enabled and running, HTTP allowed</li><li>Template <code>index.html.j2</code> → <code>/var/www/html/index.html</code>: <code>Welcome to FQDN on IPADDRESS</code></li></ul>Create <code>playbooks/apache.yml</code> targeting <b>webservers</b> group.`,
a:"Run <code>ansible-galaxy role init</code> for the skeleton. tasks/main.yml order: install httpd → start+enable httpd → start+enable firewalld → open HTTP in firewall → deploy template. Template uses <code>ansible_fqdn</code> and <code>ansible_default_ipv4.address</code>.",
s:[{l:"roles/apache/tasks/main.yml",c:`---
- ansible.builtin.yum:
    name: httpd
    state: latest
- ansible.builtin.systemd:
    name: httpd
    state: started
    enabled: yes
- ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: yes
- ansible.posix.firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes
- ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html`},
{l:"templates/index.html.j2",c:`Welcome to {{ ansible_fqdn }} on {{ ansible_default_ipv4.address }}`},
{l:"playbooks/apache.yml",c:`---
- hosts: webservers
  roles:
    - apache`}],
r:`cd /home/student/ansible
ansible-galaxy role init --init-path roles apache
# populate tasks and template, then:
ansible-navigator run playbooks/apache.yml -m stdout`,
v:["ansible webservers -a 'systemctl status httpd'","curl http://node3  # Welcome to node3.lab.example.com on 172.25.250.11","curl http://node4  # Welcome to node4.lab.example.com on 172.25.250.12"],
tr:["ansible_fqdn and ansible_default_ipv4.address in template — not inventory_hostname","firewalld must be started before the firewalld module task","hosts: webservers not hosts: prod","immediate: yes — without it rule only applies after next restart"]},
{n:"08",t:"Use roles from Ansible Galaxy",d:"med",f:["playbooks/roles.yml"],
q:`Create <code>playbooks/roles.yml</code>:<ul><li>Play on <b>webservers</b> using <b>phpinfo</b> role — <code>/hello.php</code> shows Hello PHP World from FQDN</li><li>Play on <b>balancers</b> using <b>balancer</b> role — curl alternates between node3 and node4</li></ul>`,
a:"<b>phpinfo play must come first</b> — backends must be ready before configuring the load balancer. Both roles installed in Q06.",
s:[{l:"roles.yml",c:`---
- name: Deploy phpinfo role on webservers
  hosts: webservers
  roles:
    - phpinfo

- name: Deploy balancer role on balancers
  hosts: balancers
  roles:
    - balancer`}],
r:`cd /home/student/ansible
ansible-galaxy install -r roles/requirements.yml
ansible-navigator run playbooks/roles.yml -m stdout`,

{n:"09",t:"Create and use a logical volume",d:"hard",f:["playbooks/lv.yml"],
q:`Create <code>playbooks/lv.yml</code> on all nodes:<ul><li>LV <b>data</b> in VG <b>research</b>, size <b>1500 MiB</b>, format <b>ext4</b></li><li>If size fails → print <code>Could not create logical volume of that size</code> → use <b>800 MiB</b></li><li>If VG research missing → print <code>Volume group does not exist</code></li><li><b>Do NOT mount</b> the logical volume</li></ul>`,
a:"Use <code>block/rescue</code> for size fallback. The <code>when: ansible_lvm.vgs.research is defined</code> must go on the <b>block</b>, not on individual tasks.",
s:[{l:"lv.yml",c:`---
- hosts: all
  tasks:
    - block:
        - community.general.lvol:
            vg: research
            lv: data
            size: 1500
        - community.general.filesystem:
            fstype: ext4
            dev: /dev/research/data
      rescue:
        - ansible.builtin.debug:
            msg: "Could not create logical volume of that size"
        - community.general.lvol:
            vg: research
            lv: data
            size: 800
        - community.general.filesystem:
            fstype: ext4
            dev: /dev/research/data
      when: ansible_lvm.vgs.research is defined

    - ansible.builtin.debug:
        msg: "Volume group does not exist"
      when: ansible_lvm.vgs.research is not defined`}],
r:`cd /home/student/ansible
ansible-navigator run playbooks/lv.yml -m stdout
# rescued=1 on node3 = 800 MiB fallback (correct)
# skipped on node1 = no VG (correct)`,
v:["ansible all -m shell -a 'lvs'  # node3=800m nodes2/4/5=1.47g node1=empty","ansible all -m shell -a 'blkid /dev/research/data'  # TYPE=ext4 on 2,3,4,5"],
tr:["when: on the block not on individual tasks","Do NOT mount the LV — explicitly forbidden","rescued=1 in PLAY RECAP is expected — not a failure","community.general FQCN required"]},

{n:"13",t:"Generate a hardware report",d:"med",f:["playbooks/hwreport.yml"],
q:`Create <code>playbooks/hwreport.yml</code> producing <code>/root/hwreport.txt</code> on <b>all</b> nodes:<ul><li>HOST, MEMORY (MB), BIOS version, DISK_SIZE_VDA, DISK_SIZE_VDB</li><li>Format: <code>KEY=value</code> per line · Missing hardware → <code>NONE</code></li></ul>`,
a:"get_url downloads the template. Five lineinfile tasks replace each key. Use <code>default('NONE', true)</code> — the second <code>true</code> argument is critical.",
s:[{l:"hwreport.yml",c:`---
- hosts: all
  tasks:
    - ansible.builtin.get_url:
        url: http://materials/hwreport.empty
        dest: /root/hwreport.txt
        force: yes
    - ansible.builtin.lineinfile:
        path: /root/hwreport.txt
        regexp: '^HOST='
        line: "HOST={{ inventory_hostname }}"
    - ansible.builtin.lineinfile:
        path: /root/hwreport.txt
        regexp: '^MEMORY='
        line: "MEMORY={{ ansible_memtotal_mb | default('NONE', true) }}"
    - ansible.builtin.lineinfile:
        path: /root/hwreport.txt
        regexp: '^BIOS='
        line: "BIOS={{ ansible_bios_version | default('NONE', true) }}"
    - ansible.builtin.lineinfile:
        path: /root/hwreport.txt
        regexp: '^DISK_SIZE_VDA='
        line: "DISK_SIZE_VDA={{ ansible_devices.vda.size | default('NONE', true) }}"
    - ansible.builtin.lineinfile:
        path: /root/hwreport.txt
        regexp: '^DISK_SIZE_VDB='
        line: "DISK_SIZE_VDB={{ ansible_devices.vdb.size | default('NONE', true) }}"`}],
r:`ansible-navigator run playbooks/hwreport.yml -m stdout`,
v:["ansible all -a 'cat /root/hwreport.txt'  # node1 must show DISK_SIZE_VDB=NONE"],
tr:["default('NONE', true) — second arg true is critical","force: yes refreshes template every run","regexp: '^KEY=' — the ^ anchor prevents mid-line matches"]},

let cur=0,filter='all';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.className='fb');
  el.className='fb a-'+f;
  renderSidebar();
  const vis=Q.filter(q=>f==='all'||q.d===f);
  if(vis.length&&f!=='all'&&Q[cur].d!==f){cur=Q.indexOf(vis[0]);renderMain();}
}
function renderSidebar(){
  document.getElementById('sbList').innerHTML=Q.map((q,i)=>{
    const h=filter!=='all'&&q.d!==filter;
    return `<div class="si${i===cur?' active':''}${h?' hidden':''}" onclick="goTo(${i})">
      <span class="si-num">${q.n}</span><span class="si-title">${q.t}</span><span class="bdg ${q.d}">${q.d}</span></div>`;
  }).join('');
}
function renderMain(){
  const q=Q[cur];
  document.getElementById('topFile').textContent='q'+q.n+'.md';
  const dp=document.getElementById('topDiff');
  dp.textContent=q.d;dp.className='dp '+q.d;
  document.getElementById('plbl').textContent=(cur+1)+' / '+Q.length;
  document.getElementById('pfill').style.width=(((cur+1)/Q.length)*100)+'%';
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===Q.length-1;
  const files=q.f.map(f=>`<span class="fp">${f}</span>`).join('');
  let sol='';
  if(q.s.length===1){sol=`<div class="code">${esc(q.s[0].c)}</div>`;}
  else{
    const btns=q.s.map((s,i)=>`<button class="ob${i===0?' on':''}" onclick="swO(this,${i})">${esc(s.l)}</button>`).join('');
    const pans=q.s.map((s,i)=>`<div class="op${i===0?' on':''}" id="op${i}"><div class="code">${esc(s.c)}</div></div>`).join('');
    sol=`<div class="opt-tabs">${btns}</div>${pans}`;
  }
  document.getElementById('content').innerHTML=`
    <div class="q-heading">Q${q.n} — ${q.t}</div>
    <div class="q-files">${files}</div>
    <div class="tabs">
      <div class="tab on" onclick="swT(0)">❓ Question</div>
      <div class="tab" onclick="swT(1)">💡 Approach</div>
      <div class="tab" onclick="swT(2)">📄 Solution</div>
      <div class="tab" onclick="swT(3)">▶ Run</div>
      <div class="tab" onclick="swT(4)">✅ Verify</div>
      <div class="tab" onclick="swT(5)">⚠ Traps</div>
    </div>
    <div class="panel on" id="p0"><div class="attempt">📝 Attempt the question yourself before checking the other tabs.</div><div class="qbox">${q.q}</div></div>
    <div class="panel" id="p1"><div class="prose">${q.a}</div></div>
    <div class="panel" id="p2">${sol}</div>
    <div class="panel" id="p3"><div class="run-box"><div class="run-lbl">▶ Run commands</div><div class="code">${esc(q.r)}</div></div></div>
    <div class="panel" id="p4"><ul class="vlist">${q.v.map(v=>`<li><code>${esc(v)}</code></li>`).join('')}</ul></div>
    <div class="panel" id="p5"><ul class="tlist">${q.tr.map(t=>`<li>⚠ ${esc(t)}</li>`).join('')}</ul></div>`;
}
function swT(i){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('on',i===j));}
function swO(el,i){el.closest('.panel').querySelectorAll('.ob').forEach((b,j)=>b.classList.toggle('on',i===j));el.closest('.panel').querySelectorAll('.op').forEach((p,j)=>p.classList.toggle('on',i===j));}
function goTo(i){cur=i;renderSidebar();renderMain();}
function nav(d){if(cur+d>=0&&cur+d<Q.length){cur+=d;renderSidebar();renderMain();}}
renderSidebar();renderMain();
</script>
